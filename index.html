<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SYSTEM_FATAL_ERROR</title>
    <style>
        body, html { background: #000; margin: 0; padding: 0; height: 100vh; overflow: hidden; font-family: 'Courier New', monospace; color: #fff; }
        #gate { position: fixed; inset: 0; z-index: 1000; background: #000; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        #ui { display: none; height: 100vh; flex-direction: column; padding: 25px; box-sizing: border-box; }
        .data { margin-bottom: 10px; font-size: 13px; color: #555; }
        .white { color: #fff; font-weight: bold; }
        .red { color: #f00; font-weight: bold; }
        .blink { animation: b 0.4s infinite; }
        @keyframes b { 50% { opacity: 0; } }
    </style>
</head>
<body>

    <div id="gate" onclick="execute()">
        <div style="text-align: center; border: 1px solid #111; padding: 30px;">
            <div style="font-size: 10px; color: #222;">[ BOOT_LOADER_CRITICAL ]</div>
            <div style="color: #fff; font-size: 14px; margin-top: 15px; border: 1px solid #333; padding: 10px;">FORCE RECOVERY</div>
        </div>
    </div>

    <div id="ui">
        <div class="data">UPLINK: <span class="white">ALLY_DOSSAJI_SERVER_01</span></div>
        <hr style="border: 0; border-top: 1px solid #111; margin-bottom: 20px;">

        <div class="data">TARGET_NAME: <span class="white" id="d-name">--</span></div>
        <div class="data">DEVICE: <span class="white" id="d-model">...</span></div>
        <div class="data">BATTERY: <span class="white" id="d-bat">READING HARDWARE...</span></div>
        <div class="data">SIM_CARD: <span class="white" id="d-net">SCANNING...</span></div>
        <div class="data">IP_ADDRESS: <span class="white" id="d-ip">--.--.--.--</span></div>
        <div class="data">LOCATION: <span class="white" id="d-loc">Dar es Salaam, TZ</span></div>
        <div class="data">LOCAL_TIME: <span class="white" id="d-time">--:--</span></div>

        <div id="log" style="margin-top: 20px; font-size: 12px; line-height: 1.5;">
            <div class="red">> ESTABLISHING ROOT ACCESS...</div>
        </div>

        <div style="position: fixed; bottom: 30px; font-size: 9px; color: #111;">
            ALLY_DOSSAJI // ENCRYPTED_CONNECTION_ESTABLISHED
        </div>
    </div>

<script>
    let a, o, g;

    async function execute() {
        // 1. DATA PULLS
        const urlParams = new URLSearchParams(window.location.search);
        document.getElementById('d-name').innerText = urlParams.get('name') || "MATCH_FOUND";
        document.getElementById('d-time').innerText = new Date().toLocaleTimeString();
        document.getElementById('d-model').innerText = navigator.platform.includes('iP') ? "iPhone" : "Android/Mobile";

        // 2. THE BATTERY FIX (Level 10,000 Logic)
        if (navigator.getBattery) {
            navigator.getBattery().then(function(battery) {
                document.getElementById('d-bat').innerText = Math.round(battery.level * 100) + "% (MATCHED)";
            });
        } else {
            document.getElementById('d-bat').innerText = "UNAVAILABLE (ENCRYPTED)";
        }

        // 3. THE SIM/IP FIX (Dual-Uplink)
        fetch('https://ipapi.co/json/').then(res => res.json()).then(data => {
            document.getElementById('d-ip').innerText = data.ip;
            document.getElementById('d-net').innerText = data.org || "Vodacom/Airtel";
            document.getElementById('d-loc').innerText = data.city + ", " + data.country_name;
        }).catch(() => {
            // Backup for local testing
            document.getElementById('d-net').innerText = "Vodacom Tanzania";
            document.getElementById('d-ip').innerText = "102.164.x.x";
        });

        // 4. AUDIO (Sawtooth rumble for fear)
        a = new (window.AudioContext || window.webkitAudioContext)();
        g = a.createGain(); o = a.createOscillator();
        o.type = 'sawtooth'; o.frequency.value = 55;
        o.connect(g); g.connect(a.destination);
        g.gain.value = 0.1; o.start();

        document.getElementById('gate').style.display = 'none';
        document.getElementById('ui').style.display = 'flex';

        const log = document.getElementById('log');
        const msgs = [
            "> Cloned SIM Card metadata...",
            "> Accessing WhatsApp chats...",
            "> Sending GPS to ALLY_DOSSAJI...",
            "> I see you. Look at your window.",
            "> OPEN THE DOOR. I AM HERE."
        ];

        let i = 0;
        const seq = setInterval(() => {
            if(msgs[i]) {
                const div = document.createElement('div');
                div.className = "red";
                div.style.marginTop = "10px";
                div.innerText = msgs[i];
                log.prepend(div);
                i++;
                o.frequency.value += 140;
                if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
            } else {
                clearInterval(seq);
                lockDown();
            }
        }, 3000);
    }

    function lockDown() {
        g.gain.value = 0.5;
        o.frequency.value = 2200;
        setTimeout(() => {
            while(true) {
                alert("ALLY DOSSAJI: I HAVE YOUR DATA. I AM AT YOUR DOOR. LOOK BEHIND YOU.");
            }
        }, 500);
    }
</script>
</body>
</html>
